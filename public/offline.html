<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>Project Tracker offline</title>
    <style>
      :root{color-scheme:light;background:#f8fafc;color:#0f172a;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
      main{max-width:420px;background:#fff;border:1px solid #dbe4ef;border-radius:24px;padding:28px;box-shadow:0 24px 70px rgba(15,23,42,.12)}
      h1{margin:0 0 10px;font-size:24px}p{margin:0;color:#475569;line-height:1.55}.mark{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#2563eb;color:#fff;font-weight:900;margin-bottom:16px}
    </style>
  </head>
  <body>
    <main>
      <div class="mark">PT</div>
      <h1>Нет соединения</h1>
      <p>Оболочка Project Tracker доступна offline, но данные Supabase, авторизация, файлы и realtime обновятся после восстановления сети.</p>
    </main>
  </body>
</html>
