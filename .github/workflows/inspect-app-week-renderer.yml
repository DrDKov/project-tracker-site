name: Inspect app week renderer
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspect-app-week-renderer.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print focused app snippets
        run: |
          python - <<'PY'
          from pathlib import Path
          s = Path('assets/app.js').read_text(encoding='utf-8')
          needles = ['Выполненные','По статусам','По исполнителям','Неделя','Текущ', 'wk-', 'week', 'taskView', 'renderTasks', 'kanban']
          seen = []
          for n in needles:
              pos = 0
              while True:
                  i = s.find(n, pos)
                  if i < 0:
                      break
                  a = max(0, i-900)
                  b = min(len(s), i+1600)
                  if any(abs(i-j) < 500 for j in seen):
                      pos = i + len(n)
                      continue
                  seen.append(i)
                  print('\n--- NEEDLE:', n, 'AT', i, '---')
                  print(s[a:b])
                  pos = i + len(n)
          print('\nTOTAL_LEN', len(s), 'MATCHES', len(seen))
          PY
