name: Timeline CSS fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-css-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply CSS fix
        run: |
          cat >> assets/app.css <<'CSS'

/* Timeline v95: keep long item labels visible while horizontally scrolling */
.wk-tlitem{overflow:visible!important}
.wk-tlitem h4{position:sticky!important;left:10px!important;display:block!important;width:max-content!important;max-width:560px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;-webkit-line-clamp:unset!important;-webkit-box-orient:unset!important;z-index:8!important;background:linear-gradient(90deg,rgba(255,255,255,.88),rgba(255,255,255,.62),rgba(255,255,255,0))!important;border-radius:8px!important;padding:1px 6px!important;margin-left:-6px!important;pointer-events:none!important}
.wk-tlitem div{position:sticky!important;left:10px!important;display:block!important;width:max-content!important;max-width:560px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;z-index:8!important;background:linear-gradient(90deg,rgba(255,255,255,.78),rgba(255,255,255,.48),rgba(255,255,255,0))!important;border-radius:7px!important;padding:0 6px!important;margin-left:-6px!important;pointer-events:none!important}
CSS
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('assets/app.css?v=20260430-v94','assets/app.css?v=20260507-v95')
          p.write_text(s,encoding='utf-8')
          PY
          git rm .github/workflows/apply-timeline-css-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.css index.html
          git commit -m "Keep timeline titles visible while scrolling"
          git push
