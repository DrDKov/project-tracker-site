# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply week click patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          hx=''
          block=bytes.fromhex(hx).decode()
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r'/\* Native week add task v1 start \*/[\s\S]*?/\* Native week add task v1 end \*/\n?', '', s)
          s=re.sub(r'/\* Week add click fix start \*/[\s\S]*?/\* Week add click fix end \*/\n?', '', s)
          app.write_text(s.rstrip()+'\n'+block, encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+", 'assets/app.js?v=20260512-week-click-fix', h)
          idx.write_text(h, encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js index.html
          git diff --cached --quiet || git commit -m "Fix week add click [skip ci]"
          git push || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
