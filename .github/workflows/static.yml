name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Repair week plus handler boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app = Path('assets/app.js')
          s = app.read_text(encoding='utf-8')
          s = s.replace('/* Week add task integrated start */\n(()=>{', '/* Week add task integrated start */\n;(()=>{')
          s = s.replace('/* Week add task integrated start */\n; ;(()=>{', '/* Week add task integrated start */\n;(()=>{')
          app.write_text(s, encoding='utf-8')
          idx = Path('index.html')
          h = idx.read_text(encoding='utf-8')
          h = re.sub(r"assets/app\.js\?v=[^'\"]+", 'assets/app.js?v=20260513-week-plus-boundary-fix', h)
          idx.write_text(h, encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git commit -m "Repair week plus handler boundary" || true
          git push || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
