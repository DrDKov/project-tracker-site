name: WCF
on:
  push:
    branches: [main]
    paths: ['.github/workflows/wcf.yml']
permissions:
  contents: write
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          import re
          hx=''
          block=bytes.fromhex(hx).decode()
          p=Path('assets/app.js')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'/\* Week add click fix start \*/[\s\S]*?/\* Week add click fix end \*/\n?', '', s)
          p.write_text(s.rstrip()+'\n'+block,encoding='utf-8')
          i=Path('index.html')
          h=i.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+", 'assets/app.js?v=20260512-week-click-fix', h)
          i.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git commit -m "Apply WCF [skip ci]" || exit 0
          git push
# trigger 2
