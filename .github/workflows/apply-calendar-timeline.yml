name: Apply calendar timeline
on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-calendar-timeline.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply calendar timeline patch
        run: python .github/scripts/apply_calendar_timeline_min.py
      - name: Check syntax
        run: |
          node --check assets/app-runtime.js
          node --check assets/app.js
      - name: Commit calendar timeline patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add calendar timeline task time support [skip ci]" || exit 0
          git push
