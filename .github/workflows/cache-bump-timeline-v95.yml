name: Cache bump timeline v95

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cache-bump-timeline-v95.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump stylesheet cache and remove helper
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('assets/app.css?v=20260430-v94', 'assets/app.css?v=20260507-v95')
          p.write_text(s, encoding='utf-8')
          PY
          git rm .github/workflows/cache-bump-timeline-v95.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump timeline stylesheet cache"
          git push
