name: Fix recurrence modal
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-recurrence-modal.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply recurrence modal fix
        run: python .github/scripts/fix_recurrence_modal.py
      - name: Check syntax
        run: |
          node --check assets/app-runtime.js
          node --check assets/app.js
      - name: Commit recurrence modal fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix recurrence controls in task modal [skip ci]" || exit 0
          git push
