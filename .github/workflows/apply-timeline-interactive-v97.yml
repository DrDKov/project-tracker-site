name: Apply timeline interactive v97

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-interactive-v97.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch main app files
        run: |
          python - <<'PY'
          from pathlib import Path
          app = Path('assets/app.js')
          s = app.read_text(encoding='utf-8')
          start = '/* Timeline interactive v97 start */'
          end = '/* Timeline interactive v97 end */'
          if start in s and end in s:
              a = s.index(start)
              b = s.index(end, a) + len(end)
              s = s[:a] + s[b:]
          s += r'''

/* Timeline interactive v97 start */
(()=>{if(window.__TIMELINE_INTERACTIVE_V97__)return;window.__TIMELINE_INTERACTIVE_V97__=1;
const DAY_MS=86400000;
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const D=v=>new Date(String(v||ymd(new Date())).slice(0,10)+'T00:00:00');
const add=(v,n)=>{let d=D(v);d.setDate(d.getDate()+n);return ymd(d)};
const diff=(a,b)=>Math.round((D(b)-D(a))/DAY_MS);
const textKey=v=>String(v||'').trim().replace(/\s+/g,' ').toLowerCase();
const storeKey='pt_timeline_manual_lanes_v97';
function laneMap(){try{return JSON.parse(localStorage.getItem(storeKey)||'{}')}catch{return{}}}
function saveLaneMap(m){try{localStorage.setItem(storeKey,JSON.stringify(m))}catch{}}
function sb(){return window.sb||null}
function tasks(){return Array.isArray(window.tasks)?window.tasks:[]}
function projects(){return Array.isArray(window.projects)?window.projects:[]}
function itemTitle(el){return textKey(el.querySelector('h4')?.textContent||'')}
function resolve(el){let title=itemTitle(el), kind=el.classList.contains('project')?'project':'task';let list=kind==='project'?projects():tasks();let found=list.find(x=>textKey(x.name||x.title)===title);if(!found&&el.dataset.id)found=list.find(x=>String(x.id)===String(el.dataset.id));if(!found)return null;return {kind,row:found,id:found.id,key:kind+':'+found.id};}
function dayWidth(tl){let d=tl.querySelector('.wk-tlday');return d?Math.max(40,d.getBoundingClientRect().width):150}
function firstDate(tl){let first=tl.querySelector('.wk-tlday b')?.textContent?.trim();let year=new Date().getFullYear();if(/^\d{2}\.\d{2}$/.test(first)){let [dd,mm]=first.split('.');return `${year}-${mm}-${dd}`}return ymd(new Date())}
function labelFollow(tl){let sc=tl.scrollLeft;tl.querySelectorAll('.wk-tlitem').forEach(el=>{let h=el.querySelector('h4'), sub=el.querySelector('div');if(!h)return;[h,sub].filter(Boolean).forEach(label=>{label.classList.add('wk-tl-label-follow');label.style.whiteSpace='nowrap';label.style.overflow='visible';label.style.textOverflow='clip';label.style.transform='translateX(0px)';});let left=el.offsetLeft, w=el.offsetWidth, pad=10;let raw=Math.max(0, sc-left+pad);let labelW=h.scrollWidth||0;let shift=Math.min(raw, Math.max(0,w-labelW-pad));if(labelW>w-pad*2)shift=Math.min(raw, Math.max(0,w-pad*2));h.style.transform=`translateX(${shift}px)`;if(sub)sub.style.transform=`translateX(${shift}px)`;h.title=h.textContent||'';if(sub)sub.title=sub.textContent||'';});}
function addControls(tl){tl.querySelectorAll('.wk-tlitem').forEach(el=>{if(el.__tlv97)return;el.__tlv97=1;let r=resolve(el);if(r){el.dataset.tlKind=r.kind;el.dataset.tlId=r.id;el.dataset.tlKey=r.key;el.dataset.status=r.row.status||'';}el.insertAdjacentHTML('beforeend',`<span class="tl-handle" title="Перетащить по датам и вертикальному порядку">↕</span><span class="tl-resize tl-left" title="Изменить дату начала"></span><span class="tl-resize tl-right" title="Изменить срок"></span>`);});}
function applyLanes(tl){let m=laneMap(), laneH=78, maxLane=0;tl.querySelectorAll('.wk-tlitem').forEach(el=>{let key=el.dataset.tlKey;if(!key||m[key]==null)return;let lane=Math.max(0,Number(m[key])||0);maxLane=Math.max(maxLane,lane);el.style.top=(lane*laneH+8)+'px';});let body=tl.querySelector('.wk-tlbody');if(body&&maxLane>0)body.style.height=Math.max(body.offsetHeight,(maxLane+1)*laneH+18)+'px';}
async function patchRow(kind,id,patch){let c=sb();if(!c)return;let table=kind==='project'?'projects':'tasks';let r=await c.from(table).update(patch).eq('id',id);if(r.error)throw r.error;let arr=kind==='project'?projects():tasks();let row=arr.find(x=>String(x.id)===String(id));if(row)Object.assign(row,patch);}
function installPointer(tl){if(tl.__tlPointerV97)return;tl.__tlPointerV97=1;tl.addEventListener('pointerdown',e=>{let item=e.target.closest('.wk-tlitem');if(!item)return;let r=resolve(item);if(!r)return;let mode=e.target.classList.contains('tl-left')?'resize-left':e.target.classList.contains('tl-right')?'resize-right':'move';if(mode==='move'&&!e.target.closest('.tl-handle')&&e.target.closest('button,a,input,select,textarea'))return;e.preventDefault();e.stopPropagation();let dw=dayWidth(tl), startDate=firstDate(tl), sx=e.clientX, sy=e.clientY, sl=tl.scrollLeft, st=tl.scrollTop, origLeft=item.offsetLeft, origTop=item.offsetTop, origW=item.offsetWidth;let row=r.row;let os=row.start_date||row.due_date||row.deadline||row.start_date;let oe=row.due_date||row.deadline||row.start_date||row.due_date;let laneH=78;item.setPointerCapture?.(e.pointerId);item.classList.add('tl-dragging');function move(ev){let dx=ev.clientX-sx+(tl.scrollLeft-sl), dy=ev.clientY-sy+(tl.scrollTop-st);if(mode==='move'){item.style.left=Math.max(0,origLeft+dx)+'px';item.style.top=Math.max(0,origTop+dy)+'px';}else if(mode==='resize-left'){let nl=Math.max(0,origLeft+dx), nr=origLeft+origW;item.style.left=Math.min(nl,nr-dw)+'px';item.style.width=Math.max(dw,nr-nl)+'px';}else{item.style.width=Math.max(dw,origW+dx)+'px';}labelFollow(tl);}async function up(ev){document.removeEventListener('pointermove',move,true);document.removeEventListener('pointerup',up,true);item.classList.remove('tl-dragging');let left=item.offsetLeft, width=item.offsetWidth, top=item.offsetTop;let a=Math.round(left/dw), span=Math.max(1,Math.round(width/dw));let ns=add(startDate,a), ne=add(ns,span-1);let lane=Math.max(0,Math.round(top/laneH));let m=laneMap();m[r.key]=lane;saveLaneMap(m);try{if(mode==='move'){let oldSpan=Math.max(1,diff(os,oe)+1);ne=add(ns,oldSpan-1);}let patch=r.kind==='project'?{start_date:ns,deadline:ne}:{start_date:ns,due_date:ne,sort_order:lane*1000};if(r.kind==='project')patch.sort_order=lane*1000;await patchRow(r.kind,r.id,patch);applyLanes(tl);labelFollow(tl);}catch(err){alert('Не удалось сохранить изменение таймлайна: '+(err&&err.message?err.message:String(err)));}}document.addEventListener('pointermove',move,true);document.addEventListener('pointerup',up,true);},true);}
function enhance(){let tl=document.querySelector('.wk-tl');if(!tl)return;addControls(tl);applyLanes(tl);labelFollow(tl);installPointer(tl);if(!tl.__tlScrollV97){tl.__tlScrollV97=1;tl.addEventListener('scroll',()=>labelFollow(tl),{passive:true});}}
const mo=new MutationObserver(()=>enhance());mo.observe(document.documentElement,{childList:true,subtree:true});document.addEventListener('DOMContentLoaded',enhance);setInterval(enhance,700);
})();
/* Timeline interactive v97 end */
'''
          app.write_text(s, encoding='utf-8')
          css = Path('assets/app.css')
          c = css.read_text(encoding='utf-8')
          cstart = '/* Timeline interactive v97 css start */'
          cend = '/* Timeline interactive v97 css end */'
          if cstart in c and cend in c:
              a = c.index(cstart)
              b = c.index(cend, a) + len(cend)
              c = c[:a] + c[b:]
          c += r'''

/* Timeline interactive v97 css start */
.wk-tlitem{overflow:hidden!important;cursor:grab!important;user-select:none!important}.wk-tlitem.tl-dragging{cursor:grabbing!important;z-index:50!important;box-shadow:0 18px 42px rgba(15,23,42,.24)!important}.wk-tl-label-follow{position:relative!important;left:auto!important;right:auto!important;display:block!important;width:max-content!important;max-width:none!important;min-width:0!important;white-space:nowrap!important;overflow:visible!important;text-overflow:clip!important;will-change:transform!important;background:linear-gradient(90deg,rgba(255,255,255,.96),rgba(255,255,255,.72),rgba(255,255,255,0))!important;border-radius:8px!important;padding-right:10px!important;pointer-events:none!important}.wk-tlitem.done .wk-tl-label-follow,.wk-tlitem[data-status="done"] .wk-tl-label-follow{text-decoration:line-through!important;opacity:.72!important}.tl-handle{position:absolute!important;left:3px!important;top:3px!important;width:18px!important;height:18px!important;border-radius:6px!important;background:rgba(15,23,42,.72)!important;color:#fff!important;display:grid!important;place-items:center!important;font-size:11px!important;line-height:1!important;z-index:12!important;cursor:grab!important}.tl-resize{position:absolute!important;top:0!important;bottom:0!important;width:8px!important;z-index:13!important;background:transparent!important}.tl-resize:after{content:'';position:absolute;top:8px;bottom:8px;width:2px;border-radius:9px;background:rgba(15,23,42,.28)}.tl-resize:hover:after{background:rgba(37,99,235,.9)}.tl-left{left:0!important;cursor:w-resize!important}.tl-left:after{left:2px}.tl-right{right:0!important;cursor:e-resize!important}.tl-right:after{right:2px}
/* Timeline interactive v97 css end */
'''
          css.write_text(c, encoding='utf-8')
          idx = Path('index.html')
          h = idx.read_text(encoding='utf-8')
          import re
          h = re.sub(r"assets/app\.js\?v=[^'\"]+", "assets/app.js?v=20260507-v97", h)
          h = re.sub(r"assets/app\.css\?v=[^'\"]+", "assets/app.css?v=20260507-v97", h)
          idx.write_text(h, encoding='utf-8')
          PY
          git rm .github/workflows/apply-timeline-interactive-v97.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js assets/app.css index.html
          git commit -m "Make timeline tasks draggable and resizable"
          git push
# trigger 2
