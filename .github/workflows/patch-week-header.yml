name: Patch week header
on:
  push:
    branches: [main]
    paths: ['.github/workflows/patch-week-header.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          s=Path('assets/app.js').read_text(encoding='utf-8')
          old='<h3><span>${esc(c.title)}</span><span class="week-count">${items.length}</span></h3>${items.map(cardStatus).join(\'\')||\'<div class="empty">Пусто</div>\'}'
          new='<h3><span class="week-date-title">${esc(c.title)}${c.date!==\'__none__\'?`<button type="button" class="week-add-task-btn" data-action="new-task-on-date" data-date="${esc(c.date)}">+</button>`:\'\'}</span><span class="week-count">${items.length}</span></h3>${items.map(cardStatus).join(\'\')||\'<div class="empty">Пусто</div>\'}'
          if old not in s: raise SystemExit('pattern not found')
          Path('assets/app.js').write_text(s.replace(old,new,1),encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js
          git commit -m "Patch week header [skip ci]" || exit 0
          git push
