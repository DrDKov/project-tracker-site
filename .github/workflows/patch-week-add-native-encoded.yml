name: Patch week add native encoded
on:
  push:
    branches: [main]
    paths: ['.github/workflows/patch-week-add-native-encoded.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          import base64, re
          dec=lambda x:base64.b64decode(x).decode('utf-8')
          old=dec('PGgzPjxzcGFuPiR7ZXNjKGMudGl0bGUpfTwvc3Bhbj48c3BhbiBjbGFzcz0id2Vlay1jb3VudCI+JHtpdGVtcy5sZW5ndGh9PC9zcGFuPjwvaDM+')
          new=dec('')
          handler=dec('')
          css=dec('')
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r'/\* Native week add task v1 start \*/[\s\S]*?/\* Native week add task v1 end \*/\n?', '', s)
          if old not in s and new not in s:
              Path('PATCH_WEEK_RESULT.txt').write_text('pattern not found\nweek-count index='+str(s.find('week-count'))+'\n',encoding='utf-8')
          else:
              if old in s:
                  s=s.replace(old,new,1)
              idx=s.rfind('})();')
              if idx<0: raise SystemExit('main closure end not found')
              s=s[:idx]+handler+s[idx:]
              app.write_text(s,encoding='utf-8')
              Path('PATCH_WEEK_RESULT.txt').write_text('patched\n',encoding='utf-8')
          cp=Path('assets/app.css')
          c=cp.read_text(encoding='utf-8') if cp.exists() else ''
          c=re.sub(r'/\* Native week add task css v1 start \*/[\s\S]*?/\* Native week add task css v1 end \*/\n?', '', c)+css
          cp.write_text(c,encoding='utf-8')
          idxp=Path('index.html')
          h=idxp.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+", 'assets/app.js?v=20260512-native-week-add-v1', h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+", 'assets/app.css?v=20260512-native-week-add-v1', h)
          idxp.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js assets/app.css index.html PATCH_WEEK_RESULT.txt
          git commit -m "Add native week add task button [skip ci]" || exit 0
          git push
