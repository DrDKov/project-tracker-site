name: Write week renderer inspection
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/write-week-renderer-inspection.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write focused app snippets
        run: |
          python - <<'PY'
          from pathlib import Path
          s = Path('assets/app.js').read_text(encoding='utf-8')
          needles = ['Выполненные','По статусам','По исполнителям','Неделя','Текущ', 'wk-', 'week', 'taskView', 'renderTasks', 'kanban', 'Пн', 'Вт']
          out = []
          seen = []
          for n in needles:
              pos = 0
              while True:
                  i = s.find(n, pos)
                  if i < 0:
                      break
                  if any(abs(i-j) < 700 for j in seen):
                      pos = i + len(n)
                      continue
                  seen.append(i)
                  a = max(0, i-1500)
                  b = min(len(s), i+2500)
                  out.append('\n\n--- NEEDLE %r AT %d ---\n' % (n, i))
                  out.append(s[a:b])
                  pos = i + len(n)
          out.append('\n\nTOTAL_LEN %d MATCHES %d\n' % (len(s), len(seen)))
          Path('INSPECT_WEEK_RENDERER.txt').write_text(''.join(out), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add INSPECT_WEEK_RENDERER.txt
          git diff --cached --quiet && exit 0
          git commit -m "Write week renderer inspection [skip ci]"
          git push
