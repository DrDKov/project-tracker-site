name: Replace Supabase key

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/replace-supabase-key.yml'

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace configured public anon key
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          path = Path('index.html')
          codes = [101,121,74,104,98,71,99,105,79,105,74,73,85,122,73,49,78,105,73,115,73,110,82,53,99,67,73,54,73,107,112,88,86,67,74,57,46,101,121,74,112,99,51,77,105,79,105,74,122,100,88,66,104,89,109,70,122,90,83,73,115,73,110,74,108,90,105,73,54,73,109,49,120,100,109,57,111,99,88,90,119,101,87,100,108,98,109,108,113,90,71,108,50,97,51,112,117,73,105,119,105,99,109,57,115,90,83,73,54,73,109,70,117,98,50,52,105,76,67,74,112,89,88,81,105,79,106,69,51,78,122,99,121,77,84,99,49,78,84,107,115,73,109,86,52,99,67,73,54,77,106,65,53,77,106,99,53,77,122,85,49,79,88,48,46,57,106,54,122,90,99,85,53,95,82,52,99,121,53,119,88,95,84,78,73,107,114,78,75,118,104,97,73,121,101,65,68,101,56,74,114,73,73,48,120,71,89,111]
          val = ''.join(chr(x) for x in codes)
          text = path.read_text(encoding='utf-8')
          text2, n = re.subn(r"window\.__WORKSPACE_SUPABASE_KEY__='[^']*';", "window.__WORKSPACE_SUPABASE_KEY__='" + val + "';", text, count=1)
          if n != 1:
              raise SystemExit('Supabase key assignment not found')
          path.write_text(text2, encoding='utf-8')
          PY
          git rm .github/workflows/replace-supabase-key.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use legacy Supabase anon key"
          git push
