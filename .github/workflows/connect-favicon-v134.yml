name: Connect favicon v134

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-favicon-v134.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect favicon in index
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          links = """<link rel='icon' type='image/svg+xml' href='assets/favicon.svg?v=20260508-v134'>
<link rel='shortcut icon' href='assets/favicon.svg?v=20260508-v134'>
<meta name='theme-color' content='#0f172a'>"""
          s = re.sub(r"\n<link rel=['\"](?:shortcut icon|icon)['\"][^>]*assets/favicon\.svg[^>]*>", "", s)
          if "assets/favicon.svg" not in s:
              s = s.replace("<title>Workspace · Project Tracker</title>", "<title>Workspace · Project Tracker</title>\n" + links, 1)
          p.write_text(s, encoding='utf-8')
          PY
          grep -q "assets/favicon.svg?v=20260508-v134" index.html
          test -f assets/favicon.svg
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Connect browser favicon"
          git push
# trigger 20260508-2150
