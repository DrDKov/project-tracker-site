name: Connect favicon v136

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-favicon-v134.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Switch favicon path
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('assets/favicon.svg?v=20260508-v134','/project-tracker-site/favicon.svg?v=20260508-v136')
          s=s.replace('assets/favicon.svg?v=20260508-v135','/project-tracker-site/favicon.svg?v=20260508-v136')
          p.write_text(s,encoding='utf-8')
          PY
          grep -q "/project-tracker-site/favicon.svg?v=20260508-v136" index.html
          test -f favicon.svg
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Use absolute favicon path"
          git push
# trigger 20260508-2245
