name: Rollback favicon links

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-favicon-v134.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove favicon links from index
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          remove = [
            "<link rel='icon' type='image/svg+xml' href='/project-tracker-site/favicon.svg?v=20260508-v136'>\n",
            "<link rel='shortcut icon' href='/project-tracker-site/favicon.svg?v=20260508-v136'>\n",
            "<link rel='icon' type='image/svg+xml' href='assets/favicon.svg?v=20260508-v134'>\n",
            "<link rel='shortcut icon' href='assets/favicon.svg?v=20260508-v134'>\n",
            "<meta name='theme-color' content='#0f172a'>\n"
          ]
          for x in remove:
              s = s.replace(x, '')
          p.write_text(s, encoding='utf-8')
          PY
          ! grep -q "favicon.svg" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Rollback favicon links from index"
          git push
# rollback trigger 20260508-2255
