name: Connect favicon v133

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          link="<link rel='icon' type='image/svg+xml' href='assets/favicon.svg?v=20260508-v133'>"
          if 'assets/favicon.svg' not in s:
              s=s.replace('<title>Workspace · Project Tracker</title>', '<title>Workspace · Project Tracker</title>\n'+link, 1)
          p.write_text(s,encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet || (git commit -m "Connect favicon" && git push)
