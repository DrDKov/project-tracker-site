name: Task modal two column CSS v129

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply modal CSS safely
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re
          modal_css_b64 = ''
          block = base64.b64decode(modal_css_b64).decode('utf-8')
          css_path = Path('assets/app.css')
          css = css_path.read_text(encoding='utf-8')
          css = re.sub(r"\n?/\* Task modal two-column v12[0-9] start \*/.*?/\* Task modal two-column v12[0-9] end \*/\n?", "\n", css, flags=re.S)
          css_path.write_text(css.rstrip() + "\n\n" + block + "\n", encoding='utf-8')
          idx = Path('index.html')
          html = idx.read_text(encoding='utf-8')
          html = re.sub(r"assets/app\.css\?v=[^'\"]+", "assets/app.css?v=20260508-v129", html)
          html = re.sub(r"assets/app\.js\?v=[^'\"]+", "assets/app.js?v=20260508-v129", html)
          idx.write_text(html, encoding='utf-8')
          PY
          grep -q "Task modal two-column v129" assets/app.css
          grep -q "assets/app.css?v=20260508-v129" index.html
          grep -q "assets/app.js?v=20260508-v129" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html assets/app.css
          git diff --cached --quiet && exit 0
          git commit -m "Apply task modal two column CSS"
          git push
