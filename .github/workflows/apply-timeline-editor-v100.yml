name: Apply task board mode v105

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add task board mode switch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r"\n?/\* Task board mode v10[0-9] start \*/.*?/\* Task board mode v10[0-9] end \*/\n?","\n",s,flags=re.S)
          js=r'''
          /* Task board mode v105 start */
          (()=>{if(window.__TASK_BOARD_MODE_V105__)return;window.__TASK_BOARD_MODE_V105__=1;const KEY='pt_task_board_mode_v1',E=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let mode=localStorage.getItem(KEY)==='assignee'?'assignee':'status',busy=false,raf=0;function css(){if(document.getElementById('task-board-mode-v105-css'))return;let s=document.createElement('style');s.id='task-board-mode-v105-css';s.textContent='.task-mode-toggle{display:inline-flex;gap:4px;padding:4px;border:1px solid #dbe4ef;border-radius:14px;background:#fff}.task-mode-toggle button{border:0;border-radius:10px;background:transparent;color:#475569;font-weight:900;padding:9px 12px;cursor:pointer;white-space:nowrap}.task-mode-toggle button.active{background:#0f172a;color:#fff}.kanban.assignee-mode{display:grid!important;grid-auto-flow:column!important;grid-auto-columns:minmax(285px,360px)!important;grid-template-columns:none!important;overflow-x:auto!important;align-items:start!important;padding-bottom:8px}.assignee-col h3{display:flex;justify-content:space-between;gap:8px;align-items:center}.assignee-col .assignee-count{color:#64748b;font-size:13px}.task-card .status-badge{background:#eef2ff;color:#3730a3}@media(max-width:720px){.task-mode-toggle{width:100%;justify-content:stretch}.task-mode-toggle button{flex:1}.kanban.assignee-mode{grid-auto-columns:minmax(270px,88vw)!important}}';document.head.appendChild(s)}function qs(id){return document.getElementById(id)}function arr(x){return Array.isArray(x)?x:[]}function selected(id){let e=qs(id);if(!e)return['all'];let v=[...e.selectedOptions].map(o=>o.value).filter(Boolean);if(!v.length&&e.value)v=[e.value];return(!v.length||v.includes('all'))?['all']:v}function users(){return arr(window.users)}function tasks(){return arr(window.tasks)}function rels(){return arr(window.taskAssigneesV4)}function projects(){return arr(window.projects)}function uname(id){let u=users().find(x=>x.id===id);return u?.display_name||u?.email||'—'}function pname(id){let p=projects().find(x=>x.id===id);return p?.name||'—'}function pcolor(id){let p=projects().find(x=>x.id===id);return p?.color||'#64748b'}function tids(t){let r=rels().filter(a=>a.task_id===t.id).map(a=>a.user_id);if(t.assignee_id&&!r.includes(t.assignee_id))r.push(t.assignee_id);return r.filter(Boolean)}function fmt(v){if(!v)return'—';try{return new Date(String(v).slice(0,10)+'T00:00:00').toLocaleDateString('ru-RU')}catch{return v}}function pass(t){let q=(qs('taskSearch')?.value||'').toLowerCase(),ps=selected('taskProjectFilter'),us=selected('taskAssigneeFilter'),ids=tids(t),txt=[t.title,t.notes,pname(t.project_id),ids.map(uname).join(' ')].join(' ').toLowerCase();return(ps.includes('all')||ps.includes(t.project_id))&&(us.includes('all')||us.some(u=>ids.includes(u)))&&(!q||txt.includes(q))}const ST={planned:'Запланировано',in_progress:'В работе',waiting:'Ожидание',done:'Завершено',blocked:'Заблокировано',idea:'Идея'},PR={high:'Высокий',medium:'Средний',low:'Низкий'};function card(t){let ids=tids(t),names=ids.map(uname).join(', ')||'Не назначено',done=t.status==='done',over=!done&&t.due_date&&String(t.due_date).slice(0,10)<new Date().toISOString().slice(0,10);return`<article class="task-card wk-task ${done?'wk-complete':''} ${over?'overdue':''}" data-task-id="${E(t.id)}" style="--accent:${pcolor(t.project_id)}"><label class="wk-done"><input type="checkbox" data-action="toggle-task" data-id="${E(t.id)}" ${done?'checked':''}><span></span></label><div class="row"><span class="badge status-badge">${E(ST[t.status]||t.status||'—')}</span><span class="badge">${E(PR[t.priority]||t.priority||'—')}</span>${over?'<span class="badge high">Просрочено</span>':''}</div><h4>${E(t.title)}</h4><p>${E(pname(t.project_id))}</p><p class="muted">${E(fmt(t.start_date))} → ${E(fmt(t.due_date))}</p><p class="muted">Исполнители: ${E(names)}</p>${t.notes?`<p>${E(t.notes)}</p>`:''}<div class="actions"><button class="btn sm secondary" data-action="open-task" data-id="${E(t.id)}">Редактировать</button><button class="btn sm danger" data-action="delete-task" data-id="${E(t.id)}">Убрать</button></div></article>`}function ensure(){css();let tb=qs('tasks')?.querySelector('.toolbar');if(!tb||qs('taskBoardModeToggle'))return;let w=document.createElement('div');w.id='taskBoardModeToggle';w.className='task-mode-toggle';w.innerHTML='<button type="button" data-task-mode="status">По статусам</button><button type="button" data-task-mode="assignee">По исполнителям</button>';let before=qs('newTaskBtn');tb.insertBefore(w,before||null);w.addEventListener('click',e=>{let b=e.target.closest('[data-task-mode]');if(!b)return;mode=b.dataset.taskMode;localStorage.setItem(KEY,mode);update();if(mode==='assignee')renderAssignee();else{let k=qs('kanban');if(k){k.classList.remove('assignee-mode');delete k.dataset.taskMode}qs('taskSearch')?.dispatchEvent(new Event('input',{bubbles:true}))}});update()}function update(){document.querySelectorAll('#taskBoardModeToggle [data-task-mode]').forEach(b=>b.classList.toggle('active',b.dataset.taskMode===mode))}function renderAssignee(){let box=qs('kanban');if(!box||!qs('tasks')?.classList.contains('active'))return;busy=true;let list=tasks().filter(pass),uf=selected('taskAssigneeFilter'),cols=[];if(uf.includes('all')){cols=users().map(u=>({id:u.id,title:u.display_name||u.email||'Без имени',items:list.filter(t=>tids(t).includes(u.id))}));cols.push({id:'__none__',title:'Не назначено',items:list.filter(t=>!tids(t).length)})}else cols=users().filter(u=>uf.includes(u.id)).map(u=>({id:u.id,title:u.display_name||u.email||'Без имени',items:list.filter(t=>tids(t).includes(u.id))}));box.classList.add('assignee-mode');box.dataset.taskMode='assignee';box.innerHTML=cols.map(c=>`<div class="col assignee-col" data-assignee-id="${E(c.id)}"><h3><span>${E(c.title)}</span><span class="assignee-count">${c.items.length}</span></h3>${c.items.map(card).join('')||'<div class="empty">Пусто</div>'}</div>`).join('')||'<div class="empty">Нет задач</div>';busy=false}function schedule(){if(raf)return;raf=requestAnimationFrame(()=>{raf=0;ensure();update();if(mode==='assignee')renderAssignee()})}document.addEventListener('input',e=>{if(['taskSearch','taskProjectFilter','taskAssigneeFilter'].includes(e.target.id))schedule()});document.addEventListener('change',e=>{if(['taskProjectFilter','taskAssigneeFilter'].includes(e.target.id))schedule()});new MutationObserver(()=>{if(!busy)schedule()}).observe(document.body,{childList:true,subtree:true});setInterval(schedule,900);document.readyState==='loading'?document.addEventListener('DOMContentLoaded',schedule):schedule()})();
          /* Task board mode v105 end */
          '''
          js=re.sub(r'(?m)^          ','',js).strip()
          app.write_text(s.rstrip()+'\n\n'+js+'\n',encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260507-v105",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260507-v105",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Add task board assignee view mode"
          git push
