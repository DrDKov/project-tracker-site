name: Fix assignee DnD duplicate v123

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix duplicate task in assignee board
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          # 1. task_assignees realtime/local key must be task_id+user_id first, not id first.
          s=s.replace("function rtKey(row){return row?.id||((row?.task_id||'')+'::'+(row?.user_id||''))}","function rtKey(row){return (row?.task_id&&row?.user_id)?(row.task_id+'::'+row.user_id):(row?.id||'')}" )
          # 2. Add canonical dedupe helper for S.assignees.
          helper="""function dedupeTaskAssignees(){let seen=new Set(),out=[];(S.assignees||[]).forEach(a=>{if(!a||!a.task_id||!a.user_id)return;let k=a.task_id+'::'+a.user_id;if(seen.has(k))return;seen.add(k);out.push(a)});S.assignees=out;return out}\n"""
          if 'function dedupeTaskAssignees()' not in s:
            s=s.replace('function byId(a,id){',helper+'function byId(a,id){',1)
          # 3. tids(t) must return unique user_ids.
          old="function tids(t){let r=S.assignees.filter(a=>a.task_id===t.id).map(a=>a.user_id);if(t.assignee_id&&!r.includes(t.assignee_id))r.push(t.assignee_id);return r.filter(Boolean)}"
          new="function tids(t){dedupeTaskAssignees();let seen=new Set(),r=[];S.assignees.filter(a=>a.task_id===t.id).map(a=>a.user_id).filter(Boolean).forEach(id=>{if(!seen.has(id)){seen.add(id);r.push(id)}});if(t.assignee_id&&!seen.has(t.assignee_id)){seen.add(t.assignee_id);r.push(t.assignee_id)}return r}"
          if old in s:
            s=s.replace(old,new,1)
          elif 'function tids(t){dedupeTaskAssignees();' not in s:
            s2=re.sub(r"function tids\(t\)\{.*?\}function subs",new+'function subs',s,count=1,flags=re.S)
            if s2==s: raise SystemExit('tids replacement failed')
            s=s2
          # 4. After all assignee loads, dedupe immediately.
          s=s.replace("S.assignees=await optional('task_assignees',S.sb.from('task_assignees').select('*').order('created_at',{ascending:true}),6000);","S.assignees=await optional('task_assignees',S.sb.from('task_assignees').select('*').order('created_at',{ascending:true}),6000);dedupeTaskAssignees();")
          s=s.replace("S.assignees=await optional('task_assignees/realtime',S.sb.from('task_assignees').select('*').order('created_at',{ascending:true}),7000);","S.assignees=await optional('task_assignees/realtime',S.sb.from('task_assignees').select('*').order('created_at',{ascending:true}),7000);dedupeTaskAssignees();")
          # 5. Harden realtime upsert against existing duplicate task_id/user_id rows.
          s=s.replace("arr[i]={...arr[i],...row}}else arr.push(row);return true}","arr[i]={...arr[i],...row}}else arr.push(row);if(table==='task_assignees')dedupeTaskAssignees();return true}")
          # 6. Replace common assignee drop local-state pattern if present: delete all old links then add one target link.
          # Handles patterns where code deletes task_assignees then pushes new relation locally.
          s=re.sub(r"S\.assignees=S\.assignees\.filter\(a=>a\.task_id!==id\);if\(assigneeId\)S\.assignees\.push\(\{task_id:id,user_id:assigneeId\}\);", "S.assignees=S.assignees.filter(a=>a.task_id!==id);if(assigneeId)S.assignees.push({task_id:id,user_id:assigneeId});dedupeTaskAssignees();", s)
          s=re.sub(r"S\.assignees=S\.assignees\.filter\(a=>a\.task_id!==taskId\);if\(assigneeId\)S\.assignees\.push\(\{task_id:taskId,user_id:assigneeId\}\);", "S.assignees=S.assignees.filter(a=>a.task_id!==taskId);if(assigneeId)S.assignees.push({task_id:taskId,user_id:assigneeId});dedupeTaskAssignees();", s)
          app.write_text(s,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260508-v123",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260508-v123",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          grep -q "function dedupeTaskAssignees" assets/app.js
          grep -q "function tids(t){dedupeTaskAssignees" assets/app.js
          grep -q "assets/app.js?v=20260508-v123" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Fix assignee drag duplicate tasks"
          git push
