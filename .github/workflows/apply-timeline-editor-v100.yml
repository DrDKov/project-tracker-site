name: Add assignee DnD duplicate cleanup v124

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add duplicate cleanup after assignee drag
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          helper="""
function dedupeRenderedTaskCards(){let root=$('kanban');if(!root)return;let cols=[...root.querySelectorAll('.drop-col,.kanban-col,.task-col,.board-col,[data-assignee-id],[data-col]')];if(!cols.length)cols=[...root.children];cols.forEach(col=>{let seen=new Set();[...col.querySelectorAll('.task-card[data-task-id],.wk-task[data-task-id],article[data-task-id]')].forEach(card=>{let id=card.dataset.taskId;if(!id)return;if(seen.has(id))card.remove();else seen.add(id)})})}
function afterTaskBoardMutation(){try{dedupeTaskAssignees&&dedupeTaskAssignees()}catch(e){}requestAnimationFrame(()=>{try{dedupeRenderedTaskCards()}catch(e){}})}
"""
          if 'function dedupeRenderedTaskCards()' not in s:
            if 'function dedupeTaskAssignees()' in s:
              s=s.replace('function dedupeTaskAssignees()', helper+'function dedupeTaskAssignees()', 1)
            else:
              s=s.replace('function byId(a,id){', helper+'function byId(a,id){', 1)
          # After direct renderTasks calls, clean duplicate cards in the rendered board.
          s=s.replace('renderTasks();dedupeRenderedTaskCards();','renderTasks();')
          s=s.replace('renderTasks();','renderTasks();afterTaskBoardMutation();')
          # Keep cleanup from accumulating inside its own helper if the replacement touched it.
          s=s.replace('dedupeRenderedTaskCards();afterTaskBoardMutation();','dedupeRenderedTaskCards();')
          # Add a single passive post-drop/post-dragend cleanup hook. It does not handle assignment; it only removes transient DOM duplicates.
          hook="""
(()=>{if(window.__ASSIGNEE_DND_DEDUPE_V124__)return;window.__ASSIGNEE_DND_DEDUPE_V124__=1;['drop','dragend'].forEach(ev=>document.addEventListener(ev,()=>{if(S.view==='tasks')afterTaskBoardMutation()},true));})();
"""
          if '__ASSIGNEE_DND_DEDUPE_V124__' not in s:
            s=s.replace('async function load(){', hook+'async function load(){', 1)
          app.write_text(s,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260508-v124",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260508-v124",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          grep -q "function dedupeRenderedTaskCards" assets/app.js
          grep -q "__ASSIGNEE_DND_DEDUPE_V124__" assets/app.js
          grep -q "assets/app.js?v=20260508-v124" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Remove transient duplicate task cards after assignee drag"
          git push
