name: Fix task favorites v111

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix missing favorite helper
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=s.replace("const TASK_COLUMNS='id,project_id,title,notes,status,priority,start_date,due_date,created_at,updated_at,deleted_at,assignee_id,completed_at,sort_order';","const TASK_COLUMNS='id,project_id,title,notes,status,priority,start_date,due_date,created_at,updated_at,deleted_at,assignee_id,completed_at,sort_order,is_favorite';")
          helper="""
          function isTaskFavorite(t){return !!(t&&t.is_favorite)}
          async function toggleTaskFavorite(id){let t=byId(S.tasks,id);if(!t)return;let old=!!t.is_favorite,next=!old;t.is_favorite=next;renderTasks();try{let r=await S.sb.from('tasks').update({is_favorite:next,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error}catch(e){t.is_favorite=old;renderTasks();alert('Не удалось изменить избранность задачи: '+(e.message||e))}}
          (()=>{if(window.__TASK_FAVORITES_V111__)return;window.__TASK_FAVORITES_V111__=1;function favCss(){if(document.getElementById('task-favorite-v111-css'))return;let st=document.createElement('style');st.id='task-favorite-v111-css';st.textContent='.task-card{position:relative}.task-fav-btn{position:absolute;right:34px;top:12px;width:26px;height:26px;border:0;border-radius:10px;background:rgba(255,255,255,.78);color:#94a3b8;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:6;box-shadow:0 1px 5px rgba(15,23,42,.08)}.task-fav-btn:hover{background:#fff;color:#ca8a04}.task-fav-btn.active{color:#f59e0b;background:#fffbeb}.task-card.wk-complete .task-fav-btn{opacity:1}';document.head.appendChild(st)}favCss();document.addEventListener('pointerdown',e=>{let b=e.target.closest('.task-fav-btn');if(!b)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation()},true);document.addEventListener('mousedown',e=>{let b=e.target.closest('.task-fav-btn');if(!b)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation()},true);document.addEventListener('click',e=>{let b=e.target.closest('.task-fav-btn');if(!b)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();toggleTaskFavorite(b.dataset.id)},true);document.addEventListener('DOMContentLoaded',favCss)})();
          """
          helper=re.sub(r'(?m)^          ','',helper).strip()
          if 'function isTaskFavorite(t)' not in s:
            s=s.replace('\nfunction cardT(t){','\n'+helper+'\nfunction cardT(t){',1)
          app.write_text(s,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260507-v111",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260507-v111",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Fix missing favorite helper"
          git push
