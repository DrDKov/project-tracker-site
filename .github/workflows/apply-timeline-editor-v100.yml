name: Apply task board mode v109

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch weekly task board and date filters
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r"\n?/\* Task board mode v10[0-9] start \*/.*?/\* Task board mode v10[0-9] end \*/\n?","\n",s,flags=re.S)
          new=r'''
          function renderTasks(){document.body.classList.add('v24-ready');let box=$('kanban');if(!box)return;let MODE_KEY='pt_tasks_board_mode',DONE_KEY='pt_tasks_show_done',WEEK_KEY='pt_tasks_week_start',DM_KEY='pt_tasks_date_mode',DF_KEY='pt_tasks_date_from',DT_KEY='pt_tasks_date_to';
          if(!$('task-board-mode-v109-css')){let st=document.createElement('style');st.id='task-board-mode-v109-css';st.textContent='.task-mode-toggle{display:inline-flex;gap:4px;padding:4px;border:1px solid #dbe4ef;border-radius:14px;background:#fff}.task-mode-toggle button{border:0;border-radius:10px;background:transparent;color:#475569;font-weight:900;padding:9px 12px;cursor:pointer;white-space:nowrap}.task-mode-toggle button.active{background:#0f172a;color:#fff}.task-done-toggle{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 12px;border:1px solid #dbe4ef;border-radius:14px;background:#fff;color:#0f172a;font-weight:900;white-space:nowrap}.task-done-toggle input{width:16px;height:16px}.task-week-nav,.task-date-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.task-week-nav.hidden{display:none}.task-week-nav .week-label{font-weight:900;color:#0f172a}.task-date-filter select,.task-date-filter input{height:42px}.kanban.assignee-mode,.kanban.week-mode{display:grid!important;grid-auto-flow:column!important;grid-auto-columns:minmax(285px,360px)!important;grid-template-columns:none!important;overflow-x:auto!important;align-items:start!important;padding-bottom:8px}.assignee-col h3,.week-col h3{display:flex;justify-content:space-between;gap:8px;align-items:center}.assignee-col .assignee-count,.week-col .week-count{color:#64748b;font-size:13px}.assignee-col.drag-over,.week-col.drag-over{outline:2px dashed #2563eb;outline-offset:4px;background:rgba(37,99,235,.04)}.week-col.today{background:linear-gradient(180deg,#eff6ff,#fff)!important}.week-col.weekend{background:linear-gradient(180deg,#fafafa,#fff)}.task-card .status-badge{background:#eef2ff;color:#3730a3}@media(max-width:900px){.task-week-nav,.task-date-filter{width:100%}}@media(max-width:720px){.task-mode-toggle,.task-done-toggle{width:100%;justify-content:center}.task-mode-toggle button{flex:1}.kanban.assignee-mode,.kanban.week-mode{grid-auto-columns:minmax(270px,88vw)!important}}';document.head.appendChild(st)}
          let validUserIds=new Set(S.users.map(u=>u.id).filter(Boolean));function validIds(t){return tids(t).filter(id=>validUserIds.has(id))}function done(t){return t.status==='done'}function tStart(t){return t.start_date||t.due_date||''}function tEnd(t){return t.due_date||t.start_date||''}function norm(a,b){if(a&&b&&D(a)>D(b))return[b,a];return[a,b]}function hasDate(t){return !!(t.start_date||t.due_date)}function taskOrder(a,b){let ad=done(a)?1:0,bd=done(b)?1:0;if(ad!==bd)return ad-bd;let ao=Number.isFinite(+a.sort_order)?+a.sort_order:1e12,bo=Number.isFinite(+b.sort_order)?+b.sort_order:1e12;if(ao!==bo)return ao-bo;let adue=a.due_date||'9999-12-31',bdue=b.due_date||'9999-12-31';if(adue!==bdue)return String(adue).localeCompare(String(bdue));return String(a.created_at||'').localeCompare(String(b.created_at||''))}function cardStatus(t){return cardT(t).replace('<div class="row">',`<div class="row"><span class="badge status-badge">${esc(ST[t.status]||t.status||'—')}</span>`)}function weekStart(v){let d=D(v||today()),g=d.getDay()||7;d.setDate(d.getDate()-g+1);return ymd(d)}function ddm(v){let d=D(v);return pad(d.getDate())+'.'+pad(d.getMonth()+1)}function weekDays(){let s=weekStart(S.tasksWeekStart||today());return[0,1,2,3,4,5,6].map(i=>add(s,i))}function dateActive(t,d){let a=tStart(t),b=tEnd(t);if(!a&&!b)return false;[a,b]=norm(a,b);return a<=d&&b>=d}function intersects(t,a,b){let s=tStart(t),e=tEnd(t);if(!s&&!e)return false;[s,e]=norm(s,e);return s<=b&&e>=a}function datePass(t){let m=S.tasksDateMode||'all',f=S.tasksDateFrom||'',to=S.tasksDateTo||'';if(m==='all')return true;if(m==='overdue')return t.status!=='done'&&t.due_date&&String(t.due_date).slice(0,10)<today();if(!hasDate(t))return false;if(m==='range'){if(!f&&!to)return true;return intersects(t,f||'0000-01-01',to||'9999-12-31')}if(m==='from'){if(!f)return true;let e=tEnd(t);return e&&e>=f}if(m==='exact'){if(!f)return true;return dateActive(t,f)}return true}async function saveOrder(ids){let n=1000,now=new Date().toISOString();for(let id of ids){let t=byId(S.tasks,id);if(!t)continue;t.sort_order=n;let r=await S.sb.from('tasks').update({sort_order:n,updated_at:now}).eq('id',id);if(r.error)throw Error('sort_order: '+r.error.message);n+=1000}}async function setAssignee(t,uid){let val=uid&&uid!=='__none__'?uid:null,r=await S.sb.from('tasks').update({assignee_id:val,updated_at:new Date().toISOString()}).eq('id',t.id);if(r.error)throw Error('tasks.assignee_id: '+r.error.message);t.assignee_id=val;let d=await S.sb.from('task_assignees').delete().eq('task_id',t.id);if(d.error)throw Error('task_assignees delete: '+d.error.message);S.assignees=S.assignees.filter(a=>a.task_id!==t.id);if(val){let ins=await S.sb.from('task_assignees').insert({task_id:t.id,user_id:val});if(ins.error)throw Error('task_assignees insert: '+ins.error.message);S.assignees.push({task_id:t.id,user_id:val})}}async function setTaskDate(t,target){let upd={updated_at:new Date().toISOString()};if(!target||target==='__none__'){upd.start_date=null;upd.due_date=null}else if(t.start_date&&t.due_date){let dur=Math.max(0,diff(t.start_date,t.due_date));upd.start_date=target;upd.due_date=add(target,dur)}else if(t.due_date){upd.due_date=target}else if(t.start_date){upd.start_date=target}else{upd.due_date=target}let r=await S.sb.from('tasks').update(upd).eq('id',t.id);if(r.error)throw Error('date update: '+r.error.message);Object.assign(t,upd)}
          if(!S.taskBoardDndV109){S.taskBoardDndV109=true;document.addEventListener('dragover',e=>{if(!['assignee','week'].includes(S.taskBoardMode))return;let col=e.target.closest(S.taskBoardMode==='week'?'.week-col':'.assignee-col');if(!col)return;e.preventDefault();col.classList.add('drag-over')},true);document.addEventListener('dragleave',e=>{let col=e.target.closest('.assignee-col,.week-col');if(col)col.classList.remove('drag-over')},true);document.addEventListener('drop',async e=>{if(!['assignee','week'].includes(S.taskBoardMode))return;let col=e.target.closest(S.taskBoardMode==='week'?'.week-col':'.assignee-col');if(!col)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();qa('.assignee-col,.week-col').forEach(x=>x.classList.remove('drag-over'));let id=S.dragTask||e.dataTransfer?.getData('text/plain'),t=byId(S.tasks,id);if(!t)return;let wasDone=done(t),cards=[...col.querySelectorAll('.task-card[data-task-id]')].filter(el=>el.dataset.taskId!==id).filter(el=>{let x=byId(S.tasks,el.dataset.taskId);return x&&done(x)===wasDone}),before=null;for(let el of cards){let r=el.getBoundingClientRect();if(e.clientY<r.top+r.height/2){before=el.dataset.taskId;break}}let order=cards.map(el=>el.dataset.taskId),at=before?order.indexOf(before):-1;if(at<0)order.push(id);else order.splice(at,0,id);try{if(S.taskBoardMode==='assignee')await setAssignee(t,col.dataset.assigneeId==='__none__'?null:col.dataset.assigneeId);else await setTaskDate(t,col.dataset.date||'__none__');await saveOrder([...new Set(order)]);renderTasks()}catch(err){alert('Не удалось переместить задачу: '+(err.message||err));renderTasks()}S.dragTask=null},true)}
          let tb=$('tasks')?.querySelector('.toolbar');if(tb&&!$('taskBoardModeToggle')){let sw=document.createElement('div');sw.id='taskBoardModeToggle';sw.className='task-mode-toggle';sw.innerHTML='<button type="button" data-task-mode="status">По статусам</button><button type="button" data-task-mode="assignee">По исполнителям</button><button type="button" data-task-mode="week">По неделе</button>';let before=$('newTaskBtn');tb.insertBefore(sw,before||null);sw.onclick=e=>{let b=e.target.closest('[data-task-mode]');if(!b)return;S.taskBoardMode=['status','assignee','week'].includes(b.dataset.taskMode)?b.dataset.taskMode:'status';try{localStorage.setItem(MODE_KEY,S.taskBoardMode);localStorage.setItem('pt_task_board_mode_v1',S.taskBoardMode)}catch{}renderTasks()}}if(tb&&!$('taskShowDoneWrap')){let w=document.createElement('label');w.id='taskShowDoneWrap';w.className='task-done-toggle';w.innerHTML='<input id="taskShowDoneToggle" type="checkbox"> <span>Выполненные</span>';tb.insertBefore(w,$('taskBoardModeToggle')||$('newTaskBtn'));w.onchange=()=>{S.tasksShowDone=$('taskShowDoneToggle').checked;try{localStorage.setItem(DONE_KEY,S.tasksShowDone?'1':'0')}catch{}renderTasks()}}if(tb&&!$('taskDateFilter')){let f=document.createElement('div');f.id='taskDateFilter';f.className='task-date-filter';f.innerHTML='<select class="input" id="taskDateMode"><option value="all">Все даты</option><option value="range">Интервал дат</option><option value="from">С даты и далее</option><option value="exact">На конкретную дату</option><option value="overdue">Просроченные</option></select><input class="input" id="taskDateFrom" type="date"><input class="input" id="taskDateTo" type="date"><button class="btn secondary" id="taskDateReset" type="button">Сбросить даты</button>';tb.insertBefore(f,$('newTaskBtn'));f.oninput=f.onchange=()=>{S.tasksDateMode=$('taskDateMode').value;S.tasksDateFrom=$('taskDateFrom').value;S.tasksDateTo=$('taskDateTo').value;try{localStorage.setItem(DM_KEY,S.tasksDateMode);localStorage.setItem(DF_KEY,S.tasksDateFrom);localStorage.setItem(DT_KEY,S.tasksDateTo)}catch{}renderTasks()};$('taskDateReset').onclick=()=>{S.tasksDateMode='all';S.tasksDateFrom='';S.tasksDateTo='';try{localStorage.setItem(DM_KEY,'all');localStorage.removeItem(DF_KEY);localStorage.removeItem(DT_KEY)}catch{}renderTasks()}}if(tb&&!$('taskWeekNav')){let n=document.createElement('div');n.id='taskWeekNav';n.className='task-week-nav hidden';n.innerHTML='<button class="btn secondary" data-week-nav="prev" type="button">←</button><span class="week-label" id="taskWeekLabel"></span><button class="btn secondary" data-week-nav="next" type="button">→</button><button class="btn secondary" data-week-nav="today" type="button">Текущая неделя</button>';tb.insertBefore(n,$('newTaskBtn'));n.onclick=e=>{let b=e.target.closest('[data-week-nav]');if(!b)return;let cur=weekStart(S.tasksWeekStart||today());if(b.dataset.weekNav==='prev')cur=add(cur,-7);if(b.dataset.weekNav==='next')cur=add(cur,7);if(b.dataset.weekNav==='today')cur=weekStart(today());S.tasksWeekStart=cur;try{localStorage.setItem(WEEK_KEY,cur)}catch{}renderTasks()}}
          if(!S.taskBoardMode){try{S.taskBoardMode=localStorage.getItem(MODE_KEY)||localStorage.getItem('pt_task_board_mode_v1')||'status'}catch{S.taskBoardMode='status'}}if(!['status','assignee','week'].includes(S.taskBoardMode))S.taskBoardMode='status';if(S.tasksShowDone==null){try{S.tasksShowDone=localStorage.getItem(DONE_KEY)!=='0'}catch{S.tasksShowDone=true}}if(!S.tasksWeekStart){try{S.tasksWeekStart=weekStart(localStorage.getItem(WEEK_KEY)||today())}catch{S.tasksWeekStart=weekStart(today())}}if(!S.tasksDateMode){try{S.tasksDateMode=localStorage.getItem(DM_KEY)||'all';S.tasksDateFrom=localStorage.getItem(DF_KEY)||'';S.tasksDateTo=localStorage.getItem(DT_KEY)||''}catch{S.tasksDateMode='all';S.tasksDateFrom='';S.tasksDateTo=''}}let showDone=!!S.tasksShowDone;if($('taskShowDoneToggle'))$('taskShowDoneToggle').checked=showDone;if($('taskDateMode')){$('taskDateMode').value=S.tasksDateMode;$('taskDateFrom').value=S.tasksDateFrom||'';$('taskDateTo').value=S.tasksDateTo||'';$('taskDateFrom').disabled=['all','overdue'].includes(S.tasksDateMode);$('taskDateTo').disabled=!['range'].includes(S.tasksDateMode)}if($('taskWeekNav'))$('taskWeekNav').classList.toggle('hidden',S.taskBoardMode!=='week');qa('#taskBoardModeToggle [data-task-mode]').forEach(b=>b.classList.toggle('active',b.dataset.taskMode===S.taskBoardMode));
          let q=($('taskSearch')?.value||'').toLowerCase(),ps=vals('taskProjectFilter'),us=vals('taskAssigneeFilter'),list=S.tasks.filter(t=>{let ids=validIds(t);return(showDone||!done(t))&&datePass(t)&&(ps.includes('all')||ps.includes(t.project_id))&&(us.includes('all')||us.some(u=>ids.includes(u)))&&(!q||[t.title,t.notes,pname(t.project_id),ids.map(uname).join(' ')].join(' ').toLowerCase().includes(q))}).sort(taskOrder);let note=S.tasksLoading?'<div class="task-load-note">Задачи загружаются отдельным безопасным запросом: узкий набор полей, увеличенный таймаут, повторная попытка…</div>':S.taskError?`<div class="task-load-note">Задачи не обновились: ${esc(S.taskError)}. Проекты и остальные разделы не заблокированы.</div>`:'';
          if(S.taskBoardMode==='status'){box.classList.remove('assignee-mode','week-mode');delete box.dataset.taskMode;box.innerHTML=note+COLS.map(c=>`<div class="col drop-col" data-status="${c}"><h3>${ST[c]} <span class="muted">${list.filter(t=>t.status===c).length}</span></h3>${list.filter(t=>t.status===c).sort(taskOrder).map(cardT).join('')||'<div class="empty">Пусто</div>'}</div>`).join('');return}
          if(S.taskBoardMode==='assignee'){let uf=us.includes('all')?null:new Set(us),userCols=[];S.users.forEach(u=>{if(!uf||uf.has(u.id))userCols.push({id:u.id,title:u.display_name||u.email||'Без имени',items:[]})});let none={id:'__none__',title:'Не назначено',items:[]};list.forEach(t=>{let ids=validIds(t),placed=false;ids.forEach(id=>{let c=userCols.find(x=>x.id===id);if(c){c.items.push(t);placed=true}});if(!placed&&!uf)none.items.push(t)});let cols=uf?userCols:userCols.concat([none]);box.classList.add('assignee-mode');box.classList.remove('week-mode');box.dataset.taskMode='assignee';box.innerHTML=note+(cols.map(c=>{let items=c.items.sort(taskOrder);return`<div class="col assignee-col" data-assignee-id="${esc(c.id)}"><h3><span>${esc(c.title)}</span><span class="assignee-count">${items.length}</span></h3>${items.map(cardStatus).join('')||'<div class="empty">Пусто</div>'}</div>`}).join('')||'<div class="empty">Нет задач</div>');return}
          let ds=weekDays(),labs=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];if($('taskWeekLabel'))$('taskWeekLabel').textContent='Неделя '+ddm(ds[0])+'–'+ddm(ds[6]);let cols=ds.map((d,i)=>({id:d,date:d,title:labs[i]+', '+ddm(d),items:[],today:d===today(),weekend:i>4}));let undated={id:'__none__',date:'__none__',title:'Без даты',items:[]};list.forEach(t=>{if(!hasDate(t)){undated.items.push(t);return}cols.forEach(c=>{if(dateActive(t,c.date)&&!c.items.some(x=>x.id===t.id))c.items.push(t)})});cols.push(undated);box.classList.add('week-mode');box.classList.remove('assignee-mode');box.dataset.taskMode='week';box.innerHTML=note+cols.map(c=>{let items=c.items.sort(taskOrder);return`<div class="col week-col ${c.today?'today':''} ${c.weekend?'weekend':''}" data-date="${esc(c.date)}"><h3><span>${esc(c.title)}</span><span class="week-count">${items.length}</span></h3>${items.map(cardStatus).join('')||'<div class="empty">Пусто</div>'}</div>`}).join('')}
          '''
          new=re.sub(r'(?m)^          ','',new).strip()
          s2=re.sub(r"function renderTasks\(\)\{.*?\nfunction renderTeam\(\)",new+'\nfunction renderTeam()',s,flags=re.S)
          if s2==s:
            raise SystemExit('renderTasks replacement failed')
          app.write_text(s2,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260507-v109",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260507-v109",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
