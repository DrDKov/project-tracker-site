name: Audit handlers for clean render optimization

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print handler contexts
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          s=Path('assets/app.js').read_text(encoding='utf-8')
          print('LEN',len(s))
          terms=['projectForm','taskForm','addEventListener','submit','from(\'tasks\')','from("tasks")','from(\'projects\')','from("projects")','render();','await load()','load()','S.sb.from']
          for term in terms:
              print('\n==== TERM',term,'====')
              hits=[m.start() for m in re.finditer(re.escape(term),s)]
              print('count',len(hits),'positions',hits[:50])
              for pos in hits[:20]:
                  a=max(0,pos-1400); b=min(len(s),pos+2200)
                  snippet=s[a:b].replace('\n','\\n')
                  print('--- pos',pos,'---')
                  print(snippet)
          print('\n==== FORM-LIKE FUNCTIONS ====')
          for m in re.finditer(r"\$\('(?:projectForm|taskForm|projectModal|taskModal)'\)|getElementById\('(?:projectForm|taskForm|projectModal|taskModal)'\)",s):
              pos=m.start(); print('---',m.group(0),'@',pos,'---'); print(s[max(0,pos-1800):min(len(s),pos+2600)].replace('\n','\\n'))
          PY
