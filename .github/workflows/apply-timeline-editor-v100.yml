name: Inject safe favicon loader

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add isolated favicon loader to app js
        run: |
          python - <<'PY'
          from pathlib import Path
          app = Path('assets/app.js')
          s = app.read_text(encoding='utf-8')
          block = "/* Safe favicon loader v1 start */\n(()=>{try{if(window.__SAFE_APP_ICON_V1__)return;window.__SAFE_APP_ICON_V1__=1;var h=document.head||document.getElementsByTagName('head')[0];if(!h)return;if(document.querySelector('link[data-app-icon=\"project-tracker\"]'))return;var l=document.createElement('link');l.rel='icon';l.type='image/svg+xml';l.href='assets/app-icon.svg?v=1';l.setAttribute('data-app-icon','project-tracker');h.appendChild(l)}catch(e){console.warn('[favicon]',e)}})();\n/* Safe favicon loader v1 end */\n"
          if 'Safe favicon loader v1' not in s:
              s = block + s
          app.write_text(s, encoding='utf-8')
          PY
          node --check assets/app.js
          grep -q "Safe favicon loader v1" assets/app.js
          test -f assets/app-icon.svg
          ! grep -q "favicon.svg" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js assets/app-icon.svg
          git diff --cached --quiet && exit 0
          git commit -m "Add safe browser tab icon loader"
          git push
# safe favicon loader 20260512
