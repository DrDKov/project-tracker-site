name: Force task comments loading v120

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force task comments loading
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=s.replace('subtasks:[],messages:[]','subtasks:[],taskComments:[],messages:[]')
          # Remove any previous attempted task_comments loader lines to avoid duplicates.
          s=re.sub(r"S\.taskComments=await optional\('task_comments',S\.sb\.from\('task_comments'\)\.select\('\*'\)\.is\('deleted_at',null\)\.order\('created_at',\{ascending:true\}\),7000\);", "", s)
          s=re.sub(r"S\.taskComments=await optional\('task_comments/realtime',S\.sb\.from\('task_comments'\)\.select\('\*'\)\.is\('deleted_at',null\)\.order\('created_at',\{ascending:true\}\),7000\);", "", s)
          # Primary load: insert directly before project messages load.
          marker="S.messages=await optional('project_messages',S.sb.from('project_messages').select('*').order('created_at',{ascending:true}),6000);"
          loader="S.taskComments=await optional('task_comments',S.sb.from('task_comments').select('*').is('deleted_at',null).order('created_at',{ascending:true}),7000);"
          if marker not in s:
            raise SystemExit('primary project_messages marker not found')
          s=s.replace(marker, loader+marker, 1)
          # Soft sync: insert directly after realtime subtasks load.
          soft="S.subtasks=await optional('task_subtasks/realtime',S.sb.from('task_subtasks').select('*').order('created_at',{ascending:true}),7000);"
          soft_loader="S.taskComments=await optional('task_comments/realtime',S.sb.from('task_comments').select('*').is('deleted_at',null).order('created_at',{ascending:true}),7000);"
          if soft not in s:
            raise SystemExit('soft subtasks marker not found')
          s=s.replace(soft, soft+soft_loader, 1)
          app.write_text(s,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260508-v120",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260508-v120",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          grep -q "S.taskComments=await optional('task_comments',S.sb.from('task_comments')" assets/app.js
          grep -q "S.taskComments=await optional('task_comments/realtime',S.sb.from('task_comments')" assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Force task comments loading"
          git push
