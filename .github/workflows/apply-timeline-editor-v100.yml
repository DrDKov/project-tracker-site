name: Force task modal layout v130

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force modal layout
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          css_file=Path('assets/app.css')
          css=css_file.read_text(encoding='utf-8')
          css=re.sub(r"\n?/\* Force task modal two-column v13[0-9] start \*/.*?/\* Force task modal two-column v13[0-9] end \*/\n?","\n",css,flags=re.S)
          add="/* Force task modal two-column v130 start */\n@media(min-width:701px){dialog#taskModal.modal,#taskModal[open]{width:min(1240px,calc(100vw - 28px))!important;max-width:1240px!important}dialog#taskModal>form#taskForm.modal-body{width:100%!important;max-height:calc(100vh - 44px)!important;overflow:hidden!important;display:grid!important;grid-template-columns:minmax(520px,1.35fr) minmax(390px,.9fr)!important;grid-template-rows:auto minmax(0,1fr) auto!important;column-gap:20px!important;row-gap:14px!important;padding:20px!important}dialog#taskModal>form#taskForm>.modal-head{grid-column:1/3!important;grid-row:1!important;margin:0!important}dialog#taskModal>form#taskForm>input#taskId{display:none!important}dialog#taskModal>form#taskForm>.form-grid{grid-column:1!important;grid-row:2!important;min-width:0!important;min-height:0!important;overflow:auto!important;align-content:start!important;border:1px solid #e5e7eb!important;border-radius:18px!important;background:#fff!important;padding:16px!important}dialog#taskModal>form#taskForm>#taskCommentsBlock.task-comments-block{grid-column:2!important;grid-row:2/4!important;min-width:0!important;min-height:0!important;margin:0!important;overflow:hidden!important;display:grid!important;grid-template-rows:auto minmax(0,1fr) auto!important;gap:10px!important;border:1px solid #e5e7eb!important;border-radius:18px!important;background:#f8fafc!important;padding:16px!important}dialog#taskModal>form#taskForm>#taskCommentsBlock .task-comments-list{min-height:0!important;height:auto!important;max-height:none!important;overflow:auto!important}dialog#taskModal>form#taskForm>.modal-actions{grid-column:1!important;grid-row:3!important;margin:0!important;padding:0 16px 0!important;align-self:end!important}}@media(max-width:700px){dialog#taskModal>form#taskForm.modal-body{display:block!important;max-height:calc(100vh - 24px)!important;overflow:auto!important}}\n/* Force task modal two-column v130 end */\n"
          css_file.write_text(css.rstrip()+"\n\n"+add,encoding='utf-8')
          idx=Path('index.html')
          html=idx.read_text(encoding='utf-8')
          html=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260508-v130",html)
          html=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260508-v130",html)
          idx.write_text(html,encoding='utf-8')
          PY
          grep -q "Force task modal two-column v130" assets/app.css
          grep -q "assets/app.css?v=20260508-v130" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html assets/app.css
          git diff --cached --quiet && exit 0
          git commit -m "Force task modal two column layout"
          git push
