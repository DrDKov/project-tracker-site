name: Clean favicon remnants and restore v132

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean favicon remnants and restore app asset version
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('assets/app.css?v=20260508-v137','assets/app.css?v=20260508-v132')
          s=s.replace('assets/app.js?v=20260508-v137','assets/app.js?v=20260508-v132')
          for x in [
            "<link rel='icon' type='image/svg+xml' href='/project-tracker-site/favicon.svg?v=20260508-v136'>\n",
            "<link rel='shortcut icon' href='/project-tracker-site/favicon.svg?v=20260508-v136'>\n",
            "<link rel='icon' type='image/svg+xml' href='assets/favicon.svg?v=20260508-v134'>\n",
            "<link rel='shortcut icon' href='assets/favicon.svg?v=20260508-v134'>\n",
            "<meta name='theme-color' content='#0f172a'>\n"
          ]:
            s=s.replace(x,'')
          p.write_text(s,encoding='utf-8')
          PY
          rm -f favicon.svg assets/favicon.svg .github/workflows/connect-favicon-v134.yml
          ! grep -q "favicon" index.html
          grep -q "assets/app.css?v=20260508-v132" index.html
          grep -q "assets/app.js?v=20260508-v132" index.html
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Clean favicon remnants and restore v132"
          git push
# clean favicon remnants 20260508-2330
