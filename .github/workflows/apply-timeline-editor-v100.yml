name: Apply task board mode v107

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch assignee board unassigned grouping
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r"\n?/\* Task board mode v10[0-9] start \*/.*?/\* Task board mode v10[0-9] end \*/\n?","\n",s,flags=re.S)
          new=r'''
          function renderTasks(){document.body.classList.add('v24-ready');let box=$('kanban');if(!box)return;if(!$('task-board-mode-v107-css')){let st=document.createElement('style');st.id='task-board-mode-v107-css';st.textContent='.task-mode-toggle{display:inline-flex;gap:4px;padding:4px;border:1px solid #dbe4ef;border-radius:14px;background:#fff}.task-mode-toggle button{border:0;border-radius:10px;background:transparent;color:#475569;font-weight:900;padding:9px 12px;cursor:pointer;white-space:nowrap}.task-mode-toggle button.active{background:#0f172a;color:#fff}.kanban.assignee-mode{display:grid!important;grid-auto-flow:column!important;grid-auto-columns:minmax(285px,360px)!important;grid-template-columns:none!important;overflow-x:auto!important;align-items:start!important;padding-bottom:8px}.assignee-col h3{display:flex;justify-content:space-between;gap:8px;align-items:center}.assignee-col .assignee-count{color:#64748b;font-size:13px}@media(max-width:720px){.task-mode-toggle{width:100%;justify-content:stretch}.task-mode-toggle button{flex:1}.kanban.assignee-mode{grid-auto-columns:minmax(270px,88vw)!important}}';document.head.appendChild(st)}let tb=$('tasks')?.querySelector('.toolbar');if(tb&&!$('taskBoardModeToggle')){let sw=document.createElement('div');sw.id='taskBoardModeToggle';sw.className='task-mode-toggle';sw.innerHTML='<button type="button" data-task-mode="status">По статусам</button><button type="button" data-task-mode="assignee">По исполнителям</button>';let before=$('newTaskBtn');tb.insertBefore(sw,before||null);sw.onclick=e=>{let b=e.target.closest('[data-task-mode]');if(!b)return;S.taskBoardMode=b.dataset.taskMode==='assignee'?'assignee':'status';try{localStorage.setItem('pt_task_board_mode_v1',S.taskBoardMode)}catch{}renderTasks()}}if(!S.taskBoardMode){try{S.taskBoardMode=localStorage.getItem('pt_task_board_mode_v1')==='assignee'?'assignee':'status'}catch{S.taskBoardMode='status'}}qa('#taskBoardModeToggle [data-task-mode]').forEach(b=>b.classList.toggle('active',b.dataset.taskMode===S.taskBoardMode));let q=($('taskSearch')?.value||'').toLowerCase(),ps=vals('taskProjectFilter'),us=vals('taskAssigneeFilter'),validUserIds=new Set(S.users.map(u=>u.id).filter(Boolean)),list=S.tasks.filter(t=>{let ids=tids(t).filter(id=>validUserIds.has(id));return(ps.includes('all')||ps.includes(t.project_id))&&(us.includes('all')||us.some(u=>ids.includes(u)))&&(!q||[t.title,t.notes,pname(t.project_id),ids.map(uname).join(' ')].join(' ').toLowerCase().includes(q))});let note=S.tasksLoading?'<div class="task-load-note">Задачи загружаются отдельным безопасным запросом: узкий набор полей, увеличенный таймаут, повторная попытка…</div>':S.taskError?`<div class="task-load-note">Задачи не обновились: ${esc(S.taskError)}. Проекты и остальные разделы не заблокированы.</div>`:'';if(S.taskBoardMode!=='assignee'){box.classList.remove('assignee-mode');delete box.dataset.taskMode;box.innerHTML=note+COLS.map(c=>`<div class="col drop-col" data-status="${c}"><h3>${ST[c]} <span class="muted">${list.filter(t=>t.status===c).length}</span></h3>${list.filter(t=>t.status===c).map(cardT).join('')||'<div class="empty">Пусто</div>'}</div>`).join('');return}let uf=us.includes('all')?null:new Set(us),userCols=[];S.users.forEach(u=>{if(!uf||uf.has(u.id))userCols.push({id:u.id,title:u.display_name||u.email||'Без имени',items:[]})});let none={id:'__none__',title:'Не назначено',items:[]};list.forEach(t=>{let ids=tids(t).filter(id=>validUserIds.has(id));let placed=false;ids.forEach(id=>{let c=userCols.find(x=>x.id===id);if(c){c.items.push(t);placed=true}});if(!placed&&!uf)none.items.push(t)});let cols=uf?userCols:userCols.concat([none]);box.classList.add('assignee-mode');box.dataset.taskMode='assignee';box.innerHTML=note+(cols.map(c=>`<div class="col assignee-col" data-assignee-id="${esc(c.id)}"><h3><span>${esc(c.title)}</span><span class="assignee-count">${c.items.length}</span></h3>${c.items.map(cardT).join('')||'<div class="empty">Пусто</div>'}</div>`).join('')||'<div class="empty">Нет задач</div>')}
          '''
          new=re.sub(r'(?m)^          ','',new).strip()
          s2=re.sub(r"function renderTasks\(\)\{.*?\nfunction renderTeam\(\)",new+'\nfunction renderTeam()',s,flags=re.S)
          if s2==s:
            raise SystemExit('renderTasks replacement failed')
          app.write_text(s2,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260507-v107",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260507-v107",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Group unknown assignees into unassigned task column"
          git push
