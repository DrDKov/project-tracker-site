name: Rollback safe favicon loader

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove safe favicon loader and workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          app = Path('assets/app.js')
          s = app.read_text(encoding='utf-8')
          start = '/* Safe favicon loader v1 start */\n'
          end = '/* Safe favicon loader v1 end */\n'
          if start in s and end in s:
              a = s.index(start)
              b = s.index(end) + len(end)
              s = s[:a] + s[b:]
          app.write_text(s, encoding='utf-8')
          PY
          rm -f assets/app-icon.svg
          rm -f .github/workflows/apply-timeline-editor-v100.yml
          node --check assets/app.js
          ! grep -q "Safe favicon loader v1" assets/app.js
          ! test -f assets/app-icon.svg
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Rollback safe favicon loader"
          git push
# rollback safe favicon 20260512
