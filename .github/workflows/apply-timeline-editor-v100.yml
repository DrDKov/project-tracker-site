name: Apply task descriptions and comments v117

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch task descriptions and comments
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r"\n?/\* Task comments v11[0-9] start \*/.*?/\* Task comments v11[0-9] end \*/\n?","\n",s,flags=re.S)
          # State
          s=s.replace('subtasks:[],messages:[]','subtasks:[],taskComments:[],messages:[]')
          # Initial/soft loading of comments, add after subtasks loads where present.
          pat="S.subtasks=await optional('task_subtasks',S.sb.from('task_subtasks').select('*').order('created_at',{ascending:true}),7000);"
          repl=pat+"S.taskComments=await optional('task_comments',S.sb.from('task_comments').select('*').is('deleted_at',null).order('created_at',{ascending:true}),7000);"
          s=s.replace(pat,repl)
          # Realtime arrays and tables.
          s=s.replace("table==='task_subtasks'?S.subtasks:null", "table==='task_subtasks'?S.subtasks:table==='task_comments'?S.taskComments:null")
          s=s.replace("table==='task_subtasks')&&row.deleted_at", "table==='task_subtasks'||table==='task_comments')&&row.deleted_at")
          s=s.replace("'task_subtasks','projects','app_users'", "'task_subtasks','task_comments','projects','app_users'")
          s=s.replace("'tasks','task_assignees','task_subtasks','projects','app_users'", "'tasks','task_assignees','task_subtasks','task_comments','projects','app_users'")
          # Ensure realtime render updates open comment modal too.
          s=s.replace("function scheduleRealtimeRender(reason){scheduleRender(reason||'realtime')}", "function scheduleRealtimeRender(reason){scheduleRender(reason||'realtime');if(reason&&String(reason).includes('task_comments'))requestAnimationFrame(()=>{try{renderTaskCommentsModal()}catch(e){}})}")
          # Card: remove full notes, add description indicator, comments count, and compact menu.
          s=re.sub(r"\$\{t\.notes\?`<p>\$\{esc\(t\.notes\)\}</p>`:''\}", "${t.notes?'<p class=\"muted task-desc-hint\">Есть описание</p>':''}", s)
          s=s.replace("${subBlock(t)}<div class=\"actions\"><button class=\"btn sm secondary\" data-action=\"open-task\" data-id=\"${t.id}\">Редактировать</button><button class=\"btn sm danger\" data-action=\"delete-task\" data-id=\"${t.id}\">Убрать</button></div></article>", "${subBlock(t)}<div class=\"task-card-footer\"><button type=\"button\" class=\"task-comment-badge\" data-action=\"open-task\" data-id=\"${t.id}\">💬 ${taskCommentCount(t.id)}</button><div class=\"task-more\"><button type=\"button\" class=\"task-more-btn\" data-action=\"task-menu\" data-id=\"${t.id}\">⋯</button><div class=\"task-more-menu\" data-menu-id=\"${t.id}\"><button type=\"button\" data-action=\"open-task\" data-id=\"${t.id}\">Редактировать</button><button type=\"button\" class=\"danger\" data-action=\"delete-task\" data-id=\"${t.id}\">Убрать</button></div></div></div></article>")
          block=r'''
          /* Task comments v117 start */
          function taskCommentList(taskId){return (S.taskComments||[]).filter(c=>c.task_id===taskId&&!c.deleted_at).sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||'')))}
          function taskCommentCount(taskId){return taskCommentList(taskId).length}
          function commentAuthor(id){let u=(S.users||[]).find(x=>x.id===id);if(u)return u.display_name||u.email||'Пользователь';if(S.profile&&S.profile.id===id)return S.profile.display_name||S.profile.email||'Вы';return 'Пользователь'}
          function canDeleteComment(c){return !!(S.profile&&(S.profile.id===c.user_id||['owner','admin'].includes(S.profile.role)))}
          function renderTaskCommentsModal(){let taskId=$('taskId')?.value,box=$('taskCommentsList'),cnt=$('taskCommentsCount');if(!box)return;if(!taskId){box.innerHTML='<div class="empty">Сохраните задачу, чтобы добавить комментарии.</div>';if(cnt)cnt.textContent='0';return}let list=taskCommentList(taskId);if(cnt)cnt.textContent=String(list.length);box.innerHTML=list.length?list.map(c=>`<div class="task-comment" data-comment-id="${esc(c.id)}"><div class="task-comment-meta"><b>${esc(commentAuthor(c.user_id))}</b><span>${dt(c.created_at)}</span>${canDeleteComment(c)?`<button type="button" data-action="delete-task-comment" data-id="${esc(c.id)}">Удалить</button>`:''}</div><div class="task-comment-body">${esc(c.body)}</div></div>`).join(''):'<div class="empty">Комментариев пока нет</div>'}
          async function addTaskComment(){let taskId=$('taskId')?.value,ta=$('taskCommentText');if(!taskId||!ta)return;let body=ta.value.trim();if(!body)return;let row={task_id:taskId,user_id:S.profile?.id||S.user?.id||null,body};let r=await S.sb.from('task_comments').insert(row).select('*').single();if(r.error)throw r.error;let saved=r.data||{...row,id:'local-'+Date.now(),created_at:new Date().toISOString()};rtUpsert?rtUpsert('task_comments',saved):S.taskComments.push(saved);ta.value='';renderTaskCommentsModal();scheduleRender('task-comment-add')}
          async function deleteTaskComment(id){let c=(S.taskComments||[]).find(x=>x.id===id);if(!c)return;if(!canDeleteComment(c)){alert('Нет прав на удаление комментария');return}let r=await S.sb.from('task_comments').update({deleted_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;S.taskComments=S.taskComments.filter(x=>x.id!==id);renderTaskCommentsModal();scheduleRender('task-comment-delete')}
          (()=>{if(window.__TASK_COMMENTS_V117__)return;window.__TASK_COMMENTS_V117__=1;function css(){if($('task-comments-v117-css'))return;let st=document.createElement('style');st.id='task-comments-v117-css';st.textContent='.task-desc-hint{font-size:12px}.task-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}.task-comment-badge,.task-more-btn{border:0;border-radius:10px;background:#f1f5f9;color:#334155;font-weight:900;padding:7px 9px;cursor:pointer}.task-comment-badge{font-size:12px}.task-more{position:relative}.task-more-menu{display:none;position:absolute;right:0;bottom:calc(100% + 6px);z-index:80;min-width:132px;padding:6px;border:1px solid #dbe4ef;border-radius:12px;background:#fff;box-shadow:0 16px 42px rgba(15,23,42,.18)}.task-more.open .task-more-menu{display:block}.task-more-menu button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:8px 10px;border-radius:9px;font-weight:800;color:#0f172a;cursor:pointer}.task-more-menu button:hover{background:#f8fafc}.task-more-menu .danger{color:#991b1b}.task-comments-block{margin-top:14px;border-top:1px solid #e5e7eb;padding-top:14px}.task-comments-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.task-comments-list{display:grid;gap:8px;max-height:240px;overflow:auto}.task-comment{border:1px solid #e5e7eb;border-radius:12px;background:#fff;padding:9px 10px}.task-comment-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;margin-bottom:5px}.task-comment-meta b{color:#0f172a}.task-comment-meta button{margin-left:auto;border:0;background:transparent;color:#991b1b;font-weight:800;cursor:pointer}.task-comment-body{font-size:13px;white-space:pre-wrap;overflow-wrap:anywhere}.task-comment-form{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:10px}.task-comment-form textarea{min-height:42px;resize:vertical}@media(max-width:720px){.task-comment-form{grid-template-columns:1fr}}';document.head.appendChild(st)}css();document.addEventListener('pointerdown',e=>{if(e.target.closest('.task-more,.task-comment-badge'))e.stopPropagation()},true);document.addEventListener('mousedown',e=>{if(e.target.closest('.task-more,.task-comment-badge'))e.stopPropagation()},true);document.addEventListener('click',async e=>{let mb=e.target.closest('[data-action="task-menu"]');if(mb){e.preventDefault();e.stopPropagation();let wrap=mb.closest('.task-more');document.querySelectorAll('.task-more.open').forEach(x=>{if(x!==wrap)x.classList.remove('open')});wrap?.classList.toggle('open');return}if(!e.target.closest('.task-more'))document.querySelectorAll('.task-more.open').forEach(x=>x.classList.remove('open'));if(e.target.closest('[data-action="open-task"]'))requestAnimationFrame(renderTaskCommentsModal);let add=e.target.closest('[data-action="add-task-comment"]');if(add){e.preventDefault();try{await addTaskComment()}catch(err){alert('Не удалось добавить комментарий: '+(err.message||err))}}let del=e.target.closest('[data-action="delete-task-comment"]');if(del){e.preventDefault();try{await deleteTaskComment(del.dataset.id)}catch(err){alert('Не удалось удалить комментарий: '+(err.message||err))}}});document.addEventListener('input',e=>{if(e.target&&e.target.id==='taskId')renderTaskCommentsModal()});})();
          /* Task comments v117 end */
          '''
          block=re.sub(r'(?m)^          ','',block).strip()
          if 'function taskCommentList(taskId)' not in s:
            s=s.replace('\nfunction cardT(t){','\n'+block+'\nfunction cardT(t){',1)
          app.write_text(s,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=h.replace('<span>Комментарий</span><textarea class=\'input textarea\' id=\'taskNotes\'></textarea>','<span>Описание</span><textarea class=\'input textarea\' id=\'taskNotes\' placeholder=\'Описание задачи, контекст, детали выполнения\'></textarea>')
          h=h.replace("</label></div><div class='modal-actions'><button type='button' class='btn secondary' data-close='taskModal'>Отмена</button><button class='btn primary'>Сохранить</button></div></form></dialog>","</label></div><div class='task-comments-block' id='taskCommentsBlock'><div class='task-comments-head'><h4>Комментарии</h4><span class='muted'>💬 <span id='taskCommentsCount'>0</span></span></div><div class='task-comments-list' id='taskCommentsList'><div class='empty'>Комментариев пока нет</div></div><div class='task-comment-form'><textarea class='input textarea' id='taskCommentText' placeholder='Добавить комментарий'></textarea><button class='btn secondary' type='button' data-action='add-task-comment'>Добавить комментарий</button></div></div><div class='modal-actions'><button type='button' class='btn secondary' data-close='taskModal'>Отмена</button><button class='btn primary'>Сохранить</button></div></form></dialog>")
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260508-v117",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260508-v117",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Add task descriptions and comments"
          git push
