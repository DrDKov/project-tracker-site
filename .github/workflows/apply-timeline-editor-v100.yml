name: Apply task board mode v108

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-timeline-editor-v100.yml'
      - 'timeline-dynamic-lanes-v102-trigger.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch task board visibility and assignee DnD
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          s=re.sub(r"\n?/\* Task board mode v10[0-9] start \*/.*?/\* Task board mode v10[0-9] end \*/\n?","\n",s,flags=re.S)
          new=r'''
          function renderTasks(){document.body.classList.add('v24-ready');let box=$('kanban');if(!box)return;let MODE_KEY='pt_tasks_board_mode',DONE_KEY='pt_tasks_show_done';
          if(!$('task-board-mode-v108-css')){let st=document.createElement('style');st.id='task-board-mode-v108-css';st.textContent='.task-mode-toggle{display:inline-flex;gap:4px;padding:4px;border:1px solid #dbe4ef;border-radius:14px;background:#fff}.task-mode-toggle button{border:0;border-radius:10px;background:transparent;color:#475569;font-weight:900;padding:9px 12px;cursor:pointer;white-space:nowrap}.task-mode-toggle button.active{background:#0f172a;color:#fff}.task-done-toggle{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 12px;border:1px solid #dbe4ef;border-radius:14px;background:#fff;color:#0f172a;font-weight:900;white-space:nowrap}.task-done-toggle input{width:16px;height:16px}.kanban.assignee-mode{display:grid!important;grid-auto-flow:column!important;grid-auto-columns:minmax(285px,360px)!important;grid-template-columns:none!important;overflow-x:auto!important;align-items:start!important;padding-bottom:8px}.assignee-col h3{display:flex;justify-content:space-between;gap:8px;align-items:center}.assignee-col .assignee-count{color:#64748b;font-size:13px}.assignee-col.drag-over{outline:2px dashed #2563eb;outline-offset:4px;background:rgba(37,99,235,.04)}.task-card .status-badge{background:#eef2ff;color:#3730a3}@media(max-width:720px){.task-mode-toggle,.task-done-toggle{width:100%;justify-content:center}.task-mode-toggle button{flex:1}.kanban.assignee-mode{grid-auto-columns:minmax(270px,88vw)!important}}';document.head.appendChild(st)}
          let validUserIds=new Set(S.users.map(u=>u.id).filter(Boolean));function validIds(t){return tids(t).filter(id=>validUserIds.has(id))}function done(t){return t.status==='done'}function taskOrder(a,b){let ad=done(a)?1:0,bd=done(b)?1:0;if(ad!==bd)return ad-bd;let ao=Number.isFinite(+a.sort_order)?+a.sort_order:1e12,bo=Number.isFinite(+b.sort_order)?+b.sort_order:1e12;if(ao!==bo)return ao-bo;let adue=a.due_date||'9999-12-31',bdue=b.due_date||'9999-12-31';if(adue!==bdue)return String(adue).localeCompare(String(bdue));return String(a.created_at||'').localeCompare(String(b.created_at||''))}function assigneeCard(t){return cardT(t).replace('<div class="row">',`<div class="row"><span class="badge status-badge">${esc(ST[t.status]||t.status||'—')}</span>`)}async function setAssignee(t,uid){let val=uid&&uid!=='__none__'?uid:null;let r=await S.sb.from('tasks').update({assignee_id:val,updated_at:new Date().toISOString()}).eq('id',t.id);if(r.error)throw Error('tasks.assignee_id: '+r.error.message);t.assignee_id=val;let d=await S.sb.from('task_assignees').delete().eq('task_id',t.id);if(d.error)throw Error('task_assignees delete: '+d.error.message);S.assignees=S.assignees.filter(a=>a.task_id!==t.id);if(val){let ins=await S.sb.from('task_assignees').insert({task_id:t.id,user_id:val});if(ins.error)throw Error('task_assignees insert: '+ins.error.message);S.assignees.push({task_id:t.id,user_id:val})}}async function saveOrder(ids){let n=1000,now=new Date().toISOString();for(let id of ids){let t=byId(S.tasks,id);if(!t)continue;t.sort_order=n;let r=await S.sb.from('tasks').update({sort_order:n,updated_at:now}).eq('id',id);if(r.error)throw Error('sort_order: '+r.error.message);n+=1000}}
          if(!S.taskAssigneeDndInstalled){S.taskAssigneeDndInstalled=true;document.addEventListener('dragover',e=>{if(S.taskBoardMode!=='assignee')return;let col=e.target.closest('.assignee-col');if(!col)return;e.preventDefault();col.classList.add('drag-over')},true);document.addEventListener('dragleave',e=>{let col=e.target.closest('.assignee-col');if(col)col.classList.remove('drag-over')},true);document.addEventListener('drop',async e=>{if(S.taskBoardMode!=='assignee')return;let col=e.target.closest('.assignee-col');if(!col)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();qa('.assignee-col').forEach(x=>x.classList.remove('drag-over'));let id=S.dragTask||e.dataTransfer?.getData('text/plain');let t=byId(S.tasks,id);if(!t)return;let target=col.dataset.assigneeId==='__none__'?null:col.dataset.assigneeId,wasDone=done(t);let cards=[...col.querySelectorAll('.task-card[data-task-id]')].filter(el=>el.dataset.taskId!==id).filter(el=>{let x=byId(S.tasks,el.dataset.taskId);return x&&done(x)===wasDone});let before=null;for(let el of cards){let r=el.getBoundingClientRect();if(e.clientY<r.top+r.height/2){before=el.dataset.taskId;break}}let order=cards.map(el=>el.dataset.taskId);let at=before?order.indexOf(before):-1;if(at<0)order.push(id);else order.splice(at,0,id);try{await setAssignee(t,target);await saveOrder(order);renderTasks()}catch(err){alert('Не удалось переместить задачу: '+(err.message||err));renderTasks()}S.dragTask=null},true)}
          let tb=$('tasks')?.querySelector('.toolbar');if(tb&&!$('taskBoardModeToggle')){let sw=document.createElement('div');sw.id='taskBoardModeToggle';sw.className='task-mode-toggle';sw.innerHTML='<button type="button" data-task-mode="status">По статусам</button><button type="button" data-task-mode="assignee">По исполнителям</button>';let before=$('newTaskBtn');tb.insertBefore(sw,before||null);sw.onclick=e=>{let b=e.target.closest('[data-task-mode]');if(!b)return;S.taskBoardMode=b.dataset.taskMode==='assignee'?'assignee':'status';try{localStorage.setItem(MODE_KEY,S.taskBoardMode);localStorage.setItem('pt_task_board_mode_v1',S.taskBoardMode)}catch{}renderTasks()}}if(tb&&!$('taskShowDoneWrap')){let w=document.createElement('label');w.id='taskShowDoneWrap';w.className='task-done-toggle';w.innerHTML='<input id="taskShowDoneToggle" type="checkbox"> <span>Выполненные</span>';let before=$('taskBoardModeToggle')||$('newTaskBtn');tb.insertBefore(w,before||null);w.onchange=()=>{S.tasksShowDone=$('taskShowDoneToggle').checked;try{localStorage.setItem(DONE_KEY,S.tasksShowDone?'1':'0')}catch{}renderTasks()}}
          if(!S.taskBoardMode){try{S.taskBoardMode=localStorage.getItem(MODE_KEY)||localStorage.getItem('pt_task_board_mode_v1')||'status'}catch{S.taskBoardMode='status'}S.taskBoardMode=S.taskBoardMode==='assignee'?'assignee':'status'}if(S.tasksShowDone==null){try{S.tasksShowDone=localStorage.getItem(DONE_KEY)!=='0'}catch{S.tasksShowDone=true}}let showDone=!!S.tasksShowDone;if($('taskShowDoneToggle'))$('taskShowDoneToggle').checked=showDone;qa('#taskBoardModeToggle [data-task-mode]').forEach(b=>b.classList.toggle('active',b.dataset.taskMode===S.taskBoardMode));
          let q=($('taskSearch')?.value||'').toLowerCase(),ps=vals('taskProjectFilter'),us=vals('taskAssigneeFilter'),list=S.tasks.filter(t=>{let ids=validIds(t);return(showDone||!done(t))&&(ps.includes('all')||ps.includes(t.project_id))&&(us.includes('all')||us.some(u=>ids.includes(u)))&&(!q||[t.title,t.notes,pname(t.project_id),ids.map(uname).join(' ')].join(' ').toLowerCase().includes(q))}).sort(taskOrder);let note=S.tasksLoading?'<div class="task-load-note">Задачи загружаются отдельным безопасным запросом: узкий набор полей, увеличенный таймаут, повторная попытка…</div>':S.taskError?`<div class="task-load-note">Задачи не обновились: ${esc(S.taskError)}. Проекты и остальные разделы не заблокированы.</div>`:'';
          if(S.taskBoardMode!=='assignee'){box.classList.remove('assignee-mode');delete box.dataset.taskMode;box.innerHTML=note+COLS.map(c=>`<div class="col drop-col" data-status="${c}"><h3>${ST[c]} <span class="muted">${list.filter(t=>t.status===c).length}</span></h3>${list.filter(t=>t.status===c).sort(taskOrder).map(cardT).join('')||'<div class="empty">Пусто</div>'}</div>`).join('');return}
          let uf=us.includes('all')?null:new Set(us),userCols=[];S.users.forEach(u=>{if(!uf||uf.has(u.id))userCols.push({id:u.id,title:u.display_name||u.email||'Без имени',items:[]})});let none={id:'__none__',title:'Не назначено',items:[]};list.forEach(t=>{let ids=validIds(t),placed=false;ids.forEach(id=>{let c=userCols.find(x=>x.id===id);if(c){c.items.push(t);placed=true}});if(!placed&&!uf)none.items.push(t)});let cols=uf?userCols:userCols.concat([none]);box.classList.add('assignee-mode');box.dataset.taskMode='assignee';box.innerHTML=note+(cols.map(c=>{let items=c.items.sort(taskOrder);return`<div class="col assignee-col" data-assignee-id="${esc(c.id)}"><h3><span>${esc(c.title)}</span><span class="assignee-count">${items.length}</span></h3>${items.map(assigneeCard).join('')||'<div class="empty">Пусто</div>'}</div>`}).join('')||'<div class="empty">Нет задач</div>')}
          '''
          new=re.sub(r'(?m)^          ','',new).strip()
          s2=re.sub(r"function renderTasks\(\)\{.*?\nfunction renderTeam\(\)",new+'\nfunction renderTeam()',s,flags=re.S)
          if s2==s:
            raise SystemExit('renderTasks replacement failed')
          app.write_text(s2,encoding='utf-8')
          idx=Path('index.html')
          h=idx.read_text(encoding='utf-8')
          h=re.sub(r"assets/app\.js\?v=[^'\"]+","assets/app.js?v=20260507-v108",h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+","assets/app.css?v=20260507-v108",h)
          idx.write_text(h,encoding='utf-8')
          PY
          node --check assets/app.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js index.html
          git diff --cached --quiet && echo 'No app changes to commit' && exit 0
          git commit -m "Add task done toggle and assignee drag ordering"
          git push
