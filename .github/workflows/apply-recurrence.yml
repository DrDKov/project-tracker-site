name: Apply task recurrence
on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-recurrence.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply recurrence patch
        run: python .github/scripts/apply_recurrence.py
      - name: Check runtime syntax
        run: |
          node --check assets/app-runtime.js
          node --check assets/app.js
      - name: Commit recurrence patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add task recurrence support [skip ci]" || exit 0
          git push
