name: Apply native week add
on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-native-week-add.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch app
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, re
          dec=lambda x:base64.b64decode(x).decode('utf-8')
          old=dec('PGgzPjxzcGFuPiR7ZXNjKGMudGl0bGUpfTwvc3Bhbj48c3BhbiBjbGFzcz0id2Vlay1jb3VudCI+JHtpdGVtcy5sZW5ndGh9PC9zcGFuPjwvaDM+')
          new=dec('')
          handler=dec(' lLnN0b3BJbW1lZGlhdGVQcm9wYWdhdGlvbigpO29wZW5UYXNrKGQpfWRvY3VtZW50LmFkZEV2ZW50TGlzdGVuZXIoJ2NsaWNrJypbMCwwXS5qb2luKCcnKSxoYW5kbGUsdHJ1ZSk7ZG9jdW1lbnQuYWRkRXZlbnRMaXN0ZW5lcigicG9pbnRlcmRvd24iLGhhbmRsZSx0cnVlKX0pKCk7Ci8qIFdlZWsgYWRkIHRhc2sgaW50ZWdyYXRlZCBlbmQgKi8K')
          handler=handler.replace('aW9uKSB l','aW9uKWU')
          css=dec('')
          app=Path('assets/app.js')
          s=app.read_text(encoding='utf-8')
          for p in [r'/\* Week add task integrated start \*/[\s\S]*?/\* Week add task integrated end \*/\n?',r'/\* Native week add task v1 start \*/[\s\S]*?/\* Native week add task v1 end \*/\n?',r'/\* Week add click integrated start \*/[\s\S]*?/\* Week add click integrated end \*/\n?']:
              s=re.sub(p,'',s)
          if old in s and new not in s:
              s=s.replace(old,new,1)
          if 'week-add-task-btn' not in s:
              raise SystemExit('week header patch did not apply')
          idx=s.rfind('})();')
          if idx<0:
              raise SystemExit('main closure end not found')
          s=s[:idx]+handler+s[idx:]
          app.write_text(s,encoding='utf-8')
          cp=Path('assets/app.css')
          c=cp.read_text(encoding='utf-8') if cp.exists() else ''
          c=re.sub(r'/\* Week add task integrated css start \*/[\s\S]*?/\* Week add task integrated css end \*/\n?','',c)+css
          cp.write_text(c,encoding='utf-8')
          ip=Path('index.html')
          h=ip.read_text(encoding='utf-8')
          h=re.sub(r"\n?\s*<script[^>]+assets/week-click-fix\.js[^>]*></script>",'',h)
          h=re.sub(r"assets/app\.js\?v=[^'\"]+",'assets/app.js?v=20260512-native-integrated-v3',h)
          h=re.sub(r"assets/app\.css\?v=[^'\"]+",'assets/app.css?v=20260512-native-integrated-v3',h)
          ip.write_text(h,encoding='utf-8')
          for f in ['assets/week-click-fix.js','assets/config-test-safe.js','deploy-trigger-week-click-fix.txt','.github/workflows/wcf.yml','.github/workflows/apply-native-week-add.yml']:
              p=Path(f)
              if p.exists(): p.unlink()
          PY
          node --check assets/app.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Integrate native week add button [skip ci]" || exit 0
          git push
